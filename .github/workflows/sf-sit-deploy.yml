# SIT: deploy on merge into sit (or manual). GitHub Environment "sit".
name: SF Delta · SIT · deploy

on:
  pull_request:
    types: [closed]
    branches: [sit]
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: sf-sit-deploy-${{ github.repository }}-sit
  cancel-in-progress: false

run-name: Deploy [SIT] ${{ github.event_name == 'workflow_dispatch' && 'manual' || format('PR {0}', github.event.pull_request.number) }} · ${{ github.sha }}

jobs:
  deploying:
    name: Deploying (sit)
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    timeout-minutes: 200
    environment: sit
    permissions:
      contents: read
    env:
      SF_CLI_VERSION: ${{ vars.SF_CLI_VERSION != '' && vars.SF_CLI_VERSION || '2.100.0' }}
      BUILD_SOURCEBRANCH: ${{ github.event_name == 'workflow_dispatch' && format('refs/heads/{0}', 'sit') || format('refs/heads/{0}', github.base_ref) }}
    steps:
      - uses: ./.github/workflows/reusable/steps/delta-deploy-pipeline/action.yml
        with:
          environment_name: sit
          target_branch: sit
        secrets: inherit
