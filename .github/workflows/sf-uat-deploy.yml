# UAT: deploy on merge into uat (or manual). GitHub Environment "uat".
name: SF Delta · UAT · deploy

on:
  pull_request:
    types: [closed]
    branches: [uat]
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: sf-uat-deploy-${{ github.repository }}-uat
  cancel-in-progress: false

run-name: Deploy [UAT] ${{ github.event_name == 'workflow_dispatch' && 'manual' || format('PR {0}', github.event.pull_request.number) }} · ${{ github.sha }}

jobs:
  deploying:
    name: Deploying (uat)
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    timeout-minutes: 200
    environment: uat
    permissions:
      contents: read
    env:
      SF_CLI_VERSION: ${{ vars.SF_CLI_VERSION != '' && vars.SF_CLI_VERSION || '2.100.0' }}
      BUILD_SOURCEBRANCH: ${{ github.event_name == 'workflow_dispatch' && format('refs/heads/{0}', 'uat') || format('refs/heads/{0}', github.base_ref) }}
    steps:
      - uses: ./.github/workflows/reusable/steps/delta-deploy-pipeline/action.yml
        with:
          environment_name: uat
          target_branch: uat
        secrets: inherit
