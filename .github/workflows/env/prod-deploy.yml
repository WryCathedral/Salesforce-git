# Production: deploy on merge into main (or manual). GitHub Environment "production".
name: SF Delta · PROD · deploy

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: sf-prod-deploy-${{ github.repository }}-main
  cancel-in-progress: false

run-name: Deploy [PROD] ${{ github.event_name == 'workflow_dispatch' && 'manual' || format('PR {0}', github.event.pull_request.number) }} · ${{ github.sha }}

jobs:
  deploying:
    uses: ./.github/workflows/reusable/sf-delta-deploy.yml
    with:
      environment_name: production
      target_branch: main
    secrets: inherit
