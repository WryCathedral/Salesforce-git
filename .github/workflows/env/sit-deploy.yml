# SIT: deploy on merge into sit (or manual). GitHub Environment "sit".
name: SF Delta · SIT · deploy

on:
  pull_request:
    types: [closed]
    branches: [sit]
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: sf-sit-deploy-${{ github.repository }}-sit
  cancel-in-progress: false

run-name: Deploy [SIT] ${{ github.event_name == 'workflow_dispatch' && 'manual' || format('PR {0}', github.event.pull_request.number) }} · ${{ github.sha }}

jobs:
  deploying:
    uses: ./.github/workflows/reusable/sf-delta-deploy.yml
    with:
      environment_name: sit
      target_branch: sit
    secrets: inherit
