# QA: PR validation → develop. GitHub Environment "qa".
name: SF Delta · QA · validate

on:
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '.github/workflows/**'

concurrency:
  group: sf-qa-validate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

run-name: Validate [QA] ${{ github.head_ref }} · ${{ github.event.pull_request.updated_at || github.run_id }}

jobs:
  validating:
    uses: ./.github/workflows/reusable/sf-delta-validate.yml
    with:
      environment_name: qa
    secrets: inherit
