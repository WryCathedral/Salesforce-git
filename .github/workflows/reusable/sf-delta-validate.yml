# Reusable workflow: SFDX git-delta validation (dry-run) against a Salesforce org.
# Composite actions: reusable/steps/<name>/action.yml · PowerShell/bash: reusable/scripts/
on:
  workflow_call:
    inputs:
      environment_name:
        description: GitHub Environment (qa, sit, uat, production) — maps org secrets
        required: true
        type: string

env:
  SYSTEM_PULLREQUEST_TARGETBRANCH: ${{ format('refs/heads/{0}', github.base_ref) }}
  BUILD_SOURCEBRANCH: ${{ github.ref }}
  SF_CLI_VERSION: ${{ vars.SF_CLI_VERSION != '' && vars.SF_CLI_VERSION || '2.100.0' }}

jobs:
  validating:
    name: Validating (${{ inputs.environment_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 200
    environment: ${{ inputs.environment_name }}
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/workflows/reusable/steps/setup-node-js/action.yml

      - uses: ./.github/workflows/reusable/steps/install-salesforce-cli/action.yml
        with:
          sf_cli_version: ${{ env.SF_CLI_VERSION }}

      - uses: ./.github/workflows/reusable/steps/install-git-delta-plugin/action.yml

      - uses: ./.github/workflows/reusable/steps/write-jwt-key/action.yml
        with:
          jwt_key: ${{ secrets.SF_JWT_PRIVATE_KEY }}

      - uses: ./.github/workflows/reusable/steps/install-code-analyzer/action.yml
        if: ${{ vars.SF_RUN_CODE_ANALYZER != 'false' }}

      - uses: ./.github/workflows/reusable/steps/run-code-analyzer/action.yml
        if: ${{ vars.SF_RUN_CODE_ANALYZER != 'false' }}

      - uses: ./.github/workflows/reusable/steps/upload-code-analyzer-artifact/action.yml
        if: ${{ vars.SF_RUN_CODE_ANALYZER != 'false' }}
        with:
          artifact_name: sf-code-analyzer-${{ inputs.environment_name }}

      - uses: ./.github/workflows/reusable/steps/authenticate-salesforce-org/action.yml
        with:
          username: ${{ secrets.SF_USERNAME }}
          is_dev_hub: ${{ secrets.SF_IS_DEV_HUB }}
          client_id: ${{ secrets.SF_CLIENT_ID }}
          instance_url: ${{ secrets.SF_INSTANCE_URL }}
          alias: ${{ secrets.SF_ALIAS }}

      - uses: ./.github/workflows/reusable/steps/validate-delta/action.yml
        with:
          sf_alias: ${{ secrets.SF_ALIAS }}

      - uses: ./.github/workflows/reusable/steps/upload-delta-artifact/action.yml
        with:
          artifact_name: Delta-Package-${{ inputs.environment_name }}
