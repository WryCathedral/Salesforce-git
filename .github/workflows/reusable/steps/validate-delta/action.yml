name: Validate delta (dry-run)
description: sf project deploy dry-run from delta package
inputs:
  sf_alias:
    description: Org alias (same as authenticate step)
    required: true

runs:
  using: composite
  steps:
    - run: ./.github/workflows/reusable/scripts/validate_delta.ps1 "$env:SF_ALIAS"
      shell: pwsh
      env:
        SF_ALIAS: ${{ inputs.sf_alias }}
