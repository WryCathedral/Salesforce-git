# Composite: full git-delta deploy. Caller job must set env (including SF_* from secrets) — do not use secrets: on the step.
name: Deploy delta pipeline
description: Checkout at merge/ref, CLI, JWT, authenticate, deploy delta
inputs:
  environment_name:
    required: true
  target_branch:
    description: Branch name for workflow_dispatch checkout (e.g. develop, main)
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_branch || github.event.pull_request.merge_commit_sha }}

    - uses: ./.github/workflows/reusable/steps/setup-node-js/action.yml

    - uses: ./.github/workflows/reusable/steps/install-salesforce-cli/action.yml
      with:
        sf_cli_version: ${{ env.SF_CLI_VERSION }}

    - uses: ./.github/workflows/reusable/steps/install-git-delta-plugin/action.yml

    - uses: ./.github/workflows/reusable/steps/write-jwt-key/action.yml
      with:
        jwt_key: ${{ env.SF_JWT_PRIVATE_KEY }}

    - uses: ./.github/workflows/reusable/steps/authenticate-salesforce-org/action.yml
      with:
        username: ${{ env.SF_USERNAME }}
        is_dev_hub: ${{ env.SF_IS_DEV_HUB }}
        client_id: ${{ env.SF_CLIENT_ID }}
        instance_url: ${{ env.SF_INSTANCE_URL }}
        alias: ${{ env.SF_ALIAS }}

    - run: ./.github/workflows/reusable/scripts/deploy_delta.ps1 "$env:SF_ALIAS"
      shell: pwsh
      env:
        SF_ALIAS: ${{ env.SF_ALIAS }}
