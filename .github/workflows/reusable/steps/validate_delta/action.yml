# Composite: full git-delta validation. Caller job must set env (including SF_* from secrets).
# Local composite actions: use the directory path (contains action.yml), not .../action.yml.
name: Validate delta pipeline
description: CLI, JWT, optional Code Analyzer, authenticate, validate delta, upload artifacts (checkout is first step of parent workflow)
inputs:
  environment_name:
    required: true

runs:
  using: composite
  steps:
    - uses: ./.github/workflows/reusable/steps/setup-node-js

    - uses: ./.github/workflows/reusable/steps/install-salesforce-cli
      with:
        sf_cli_version: ${{ env.SF_CLI_VERSION }}

    - uses: ./.github/workflows/reusable/steps/install-git-delta-plugin

    - uses: ./.github/workflows/reusable/steps/write-jwt-key
      with:
        jwt_key: ${{ env.SF_JWT_PRIVATE_KEY }}

    - uses: ./.github/workflows/reusable/steps/install-code-analyzer
      if: ${{ vars.SF_RUN_CODE_ANALYZER != 'false' }}

    - uses: ./.github/workflows/reusable/steps/run-code-analyzer
      if: ${{ vars.SF_RUN_CODE_ANALYZER != 'false' }}

    - uses: ./.github/workflows/reusable/steps/upload-code-analyzer-artifact
      if: ${{ vars.SF_RUN_CODE_ANALYZER != 'false' }}
      with:
        artifact_name: sf-code-analyzer-${{ inputs.environment_name }}

    - uses: ./.github/workflows/reusable/steps/authenticate-salesforce-org
      with:
        username: ${{ env.SF_USERNAME }}
        is_dev_hub: ${{ env.SF_IS_DEV_HUB }}
        client_id: ${{ env.SF_CLIENT_ID }}
        instance_url: ${{ env.SF_INSTANCE_URL }}
        alias: ${{ env.SF_ALIAS }}

    - run: ./.github/workflows/reusable/scripts/validate_delta.ps1 "$env:SF_ALIAS"
      shell: pwsh
      env:
        SF_ALIAS: ${{ env.SF_ALIAS }}

    - uses: ./.github/workflows/reusable/steps/upload-delta-artifact
      with:
        artifact_name: Delta-Package-${{ inputs.environment_name }}
