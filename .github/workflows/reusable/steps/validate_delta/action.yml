# Composite: full git-delta validation. Caller job must set env (including SF_* from secrets) — do not use secrets: on the step.
name: Validate delta pipeline
description: Checkout, CLI, JWT, optional Code Analyzer, authenticate, validate delta, upload artifacts
inputs:
  environment_name:
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: ./.github/workflows/reusable/steps/setup-node-js/action.yml

    - uses: ./.github/workflows/reusable/steps/install-salesforce-cli/action.yml
      with:
        sf_cli_version: ${{ env.SF_CLI_VERSION }}

    - uses: ./.github/workflows/reusable/steps/install-git-delta-plugin/action.yml

    - uses: ./.github/workflows/reusable/steps/write-jwt-key/action.yml
      with:
        jwt_key: ${{ env.SF_JWT_PRIVATE_KEY }}

    - uses: ./.github/workflows/reusable/steps/install-code-analyzer/action.yml
      if: ${{ vars.SF_RUN_CODE_ANALYZER != 'false' }}

    - uses: ./.github/workflows/reusable/steps/run-code-analyzer/action.yml
      if: ${{ vars.SF_RUN_CODE_ANALYZER != 'false' }}

    - uses: ./.github/workflows/reusable/steps/upload-code-analyzer-artifact/action.yml
      if: ${{ vars.SF_RUN_CODE_ANALYZER != 'false' }}
      with:
        artifact_name: sf-code-analyzer-${{ inputs.environment_name }}

    - uses: ./.github/workflows/reusable/steps/authenticate-salesforce-org/action.yml
      with:
        username: ${{ env.SF_USERNAME }}
        is_dev_hub: ${{ env.SF_IS_DEV_HUB }}
        client_id: ${{ env.SF_CLIENT_ID }}
        instance_url: ${{ env.SF_INSTANCE_URL }}
        alias: ${{ env.SF_ALIAS }}

    - run: ./.github/workflows/reusable/scripts/validate_delta.ps1 "$env:SF_ALIAS"
      shell: pwsh
      env:
        SF_ALIAS: ${{ env.SF_ALIAS }}

    - uses: ./.github/workflows/reusable/steps/upload-delta-artifact/action.yml
      with:
        artifact_name: Delta-Package-${{ inputs.environment_name }}
