# Reusable workflow: git-delta deploy. Must live at .github/workflows/ root (GitHub requirement).
# Composite actions: reusable/steps/<name>/action.yml · scripts: reusable/scripts/
on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      target_branch:
        description: Long-lived branch merged into (develop, sit, uat, main)
        required: true
        type: string

env:
  BUILD_SOURCEBRANCH: ${{ github.event_name == 'workflow_dispatch' && format('refs/heads/{0}', inputs.target_branch) || format('refs/heads/{0}', github.base_ref) }}
  SF_CLI_VERSION: ${{ vars.SF_CLI_VERSION != '' && vars.SF_CLI_VERSION || '2.100.0' }}

jobs:
  deploying:
    name: Deploying (${{ inputs.environment_name }})
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    timeout-minutes: 200
    environment: ${{ inputs.environment_name }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_branch || github.event.pull_request.merge_commit_sha }}

      - uses: ./.github/workflows/reusable/steps/setup-node-js/action.yml

      - uses: ./.github/workflows/reusable/steps/install-salesforce-cli/action.yml
        with:
          sf_cli_version: ${{ env.SF_CLI_VERSION }}

      - uses: ./.github/workflows/reusable/steps/install-git-delta-plugin/action.yml

      - uses: ./.github/workflows/reusable/steps/write-jwt-key/action.yml
        with:
          jwt_key: ${{ secrets.SF_JWT_PRIVATE_KEY }}

      - uses: ./.github/workflows/reusable/steps/authenticate-salesforce-org/action.yml
        with:
          username: ${{ secrets.SF_USERNAME }}
          is_dev_hub: ${{ secrets.SF_IS_DEV_HUB }}
          client_id: ${{ secrets.SF_CLIENT_ID }}
          instance_url: ${{ secrets.SF_INSTANCE_URL }}
          alias: ${{ secrets.SF_ALIAS }}

      - uses: ./.github/workflows/reusable/steps/deploy-delta/action.yml
        with:
          sf_alias: ${{ secrets.SF_ALIAS }}
