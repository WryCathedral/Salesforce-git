#################################################################################################################################
# Deploy to QA only when a PR is merged INTO develop (e.g. feature → develop).
#
# Does NOT run for:
#   - PRs targeting main (e.g. develop → main) — base branch is main, not develop
#   - Pushes to develop that are not a merged PR (optional; use workflow_dispatch instead)
#   - Opening/updating PRs (only runs on merge = closed + merged)
#
# Manual run: Actions → "Salesforce QA - deploy" → Run workflow (deploys current develop).
#
# Secrets: SF_JWT_PRIVATE_KEY, SF_CLIENT_ID, SF_USERNAME, SF_INSTANCE_URL, SF_ALIAS, SF_IS_DEV_HUB
# Variables: SF_CLI_VERSION (optional)
#################################################################################################################################

name: Salesforce QA - deploy

on:
  pull_request:
    types: [closed]
    branches:
      - develop
  workflow_dispatch:

# merge into develop / manual
run-name: Deploy - ${{ github.event_name == 'workflow_dispatch' && 'manual' || format('merge PR {0}', github.event.pull_request.number) }} - ${{ github.sha }}

concurrency:
  group: salesforce-qa-deploy-${{ github.repository }}-develop
  cancel-in-progress: false

env:
  # push used refs/heads/develop; pull_request uses refs/pull/.../merge — scripts expect a branch ref
  BUILD_SOURCEBRANCH: ${{ github.event_name == 'workflow_dispatch' && 'refs/heads/develop' || format('refs/heads/{0}', github.base_ref) }}
  SF_CLI_VERSION: ${{ vars.SF_CLI_VERSION != '' && vars.SF_CLI_VERSION || '2.100.0' }}

jobs:
  deploying:
    name: Deploying
    # PR path: only after a PR into develop was merged (not when PR is closed without merge)
    # Manual path: workflow_dispatch always runs this job
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    timeout-minutes: 200
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Manual: tip of develop; merged PR: exact merge commit on develop
          ref: ${{ github.event_name == 'workflow_dispatch' && 'develop' || github.event.pull_request.merge_commit_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        shell: pwsh
        run: ./.github/workflows/scripts/install_sf_cli.ps1 "${{ env.SF_CLI_VERSION }}"

      - name: Install SFDX Git Delta plugin
        shell: pwsh
        run: ./.github/workflows/scripts/install_sfdx_git_delta_plugin.ps1

      - name: Write JWT key file
        shell: bash
        env:
          SF_JWT_PRIVATE_KEY: ${{ secrets.SF_JWT_PRIVATE_KEY }}
        run: |
          if [ -z "$SF_JWT_PRIVATE_KEY" ]; then
            echo "SF_JWT_PRIVATE_KEY secret is not set."
            exit 1
          fi
          printf '%s\n' "$SF_JWT_PRIVATE_KEY" > "$GITHUB_WORKSPACE/privatekey.key"
          chmod 600 "$GITHUB_WORKSPACE/privatekey.key"

      - name: Authorize QA org (JWT)
        shell: bash
        env:
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_IS_DEV_HUB: ${{ secrets.SF_IS_DEV_HUB }}
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_INSTANCE_URL: ${{ secrets.SF_INSTANCE_URL }}
          SF_ALIAS: ${{ secrets.SF_ALIAS }}
        run: |
          bash ./.github/workflows/scripts/authenticate_org.sh \
            "$SF_USERNAME" "$SF_IS_DEV_HUB" "$SF_CLIENT_ID" "$SF_INSTANCE_URL" "$SF_ALIAS" \
            "$GITHUB_WORKSPACE/privatekey.key"

      - name: Deploy delta
        shell: pwsh
        env:
          SF_ALIAS: ${{ secrets.SF_ALIAS }}
        run: ./.github/workflows/scripts/deploy_delta.ps1 "$env:SF_ALIAS"
