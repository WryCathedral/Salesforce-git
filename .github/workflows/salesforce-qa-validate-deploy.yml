#################################################################################################################################
# Salesforce QA: validate on PR to develop, deploy on push to develop.
#
# Validate : pull_request targeting develop — delta validation (Code Analyzer + sf deploy dry-run / RunLocalTests per script rules).
# Deploy     : push to develop (after PR merge) — delta deploy to QA org.
#
# Configure repository Secrets (mirror Azure variable groups + secure file):
#   SF_JWT_PRIVATE_KEY   — contents of privatekey.key (Connected App JWT cert)
#   SF_CLIENT_ID         — Connected App consumer key (Azure: client_id)
#   SF_USERNAME          — deployment user (Azure: username)
#   SF_INSTANCE_URL      — e.g. https://test.salesforce.com (Azure: instance_url)
#   SF_ALIAS             — org alias for sf commands (Azure: alias)
#   SF_IS_DEV_HUB        — true or false (Azure: isdevhub)
# Optional:
#   SF_CLI_VERSION       — @salesforce/cli version (defaults below; Azure: Salesforce-CLI-Version group)
#################################################################################################################################

name: Salesforce QA — validate (PR) & deploy (develop)

on:
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, reopened]
    paths-ignore:
      - README.md
  push:
    branches:
      - develop
    paths-ignore:
      - README.md

# Avoid overlapping deploys; PR validation can run per PR
concurrency:
  group: salesforce-qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # Scripts read these (Azure DevOps compatibility)
  SYSTEM_PULLREQUEST_TARGETBRANCH: ${{ github.event_name == 'pull_request' && format('refs/heads/{0}', github.base_ref) || '' }}
  BUILD_SOURCEBRANCH: ${{ github.ref }}
  # Override default via Repository variable "SF_CLI_VERSION" (Settings → Variables → Actions)
  SF_CLI_VERSION: ${{ vars.SF_CLI_VERSION != '' && vars.SF_CLI_VERSION || '2.100.0' }}

jobs:
  validate:
    name: Validate delta (PR → develop)
    if: github.event_name == 'pull_request' && github.base_ref == 'develop'
    runs-on: ubuntu-latest
    timeout-minutes: 200
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js (for Salesforce CLI install)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        shell: pwsh
        run: ./.github/workflows/scripts/install_sf_cli.ps1 "${{ env.SF_CLI_VERSION }}"

      - name: Install SFDX Git Delta plugin
        shell: pwsh
        run: ./.github/workflows/scripts/install_sfdx_git_delta_plugin.ps1

      - name: Write JWT key file
        shell: bash
        env:
          SF_JWT_PRIVATE_KEY: ${{ secrets.SF_JWT_PRIVATE_KEY }}
        run: |
          if [ -z "$SF_JWT_PRIVATE_KEY" ]; then
            echo "SF_JWT_PRIVATE_KEY secret is not set."
            exit 1
          fi
          printf '%s\n' "$SF_JWT_PRIVATE_KEY" > "$GITHUB_WORKSPACE/privatekey.key"
          chmod 600 "$GITHUB_WORKSPACE/privatekey.key"

      - name: Install Salesforce Code Analyzer plugin
        shell: pwsh
        run: ./.github/workflows/scripts/install_sf_code_analyzer.ps1

      - name: Run Code Analyzer on delta
        shell: pwsh
        run: ./.github/workflows/scripts/run_sf_code_analyzer_on_delta.ps1

      - name: Upload Code Analyzer reports
        uses: actions/upload-artifact@v4
        with:
          name: sf-code-analyzer
          path: reports/
          if-no-files-found: warn

      - name: Authorize QA org (JWT)
        shell: bash
        env:
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_IS_DEV_HUB: ${{ secrets.SF_IS_DEV_HUB }}
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_INSTANCE_URL: ${{ secrets.SF_INSTANCE_URL }}
          SF_ALIAS: ${{ secrets.SF_ALIAS }}
        run: |
          ./.github/workflows/scripts/authenticate_org.sh \
            "$SF_USERNAME" "$SF_IS_DEV_HUB" "$SF_CLIENT_ID" "$SF_INSTANCE_URL" "$SF_ALIAS" \
            "$GITHUB_WORKSPACE/privatekey.key"

      - name: Validate delta (dry-run)
        shell: pwsh
        env:
          SF_ALIAS: ${{ secrets.SF_ALIAS }}
        run: ./.github/workflows/scripts/validate_delta.ps1 "$env:SF_ALIAS"

      - name: Upload delta package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Delta-Package
          path: artifacts/
          if-no-files-found: warn

  deploy:
    name: Deploy delta (push develop)
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    timeout-minutes: 200
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        shell: pwsh
        run: ./.github/workflows/scripts/install_sf_cli.ps1 "${{ env.SF_CLI_VERSION }}"

      - name: Install SFDX Git Delta plugin
        shell: pwsh
        run: ./.github/workflows/scripts/install_sfdx_git_delta_plugin.ps1

      - name: Write JWT key file
        shell: bash
        env:
          SF_JWT_PRIVATE_KEY: ${{ secrets.SF_JWT_PRIVATE_KEY }}
        run: |
          if [ -z "$SF_JWT_PRIVATE_KEY" ]; then
            echo "SF_JWT_PRIVATE_KEY secret is not set."
            exit 1
          fi
          printf '%s\n' "$SF_JWT_PRIVATE_KEY" > "$GITHUB_WORKSPACE/privatekey.key"
          chmod 600 "$GITHUB_WORKSPACE/privatekey.key"

      - name: Authorize QA org (JWT)
        shell: bash
        env:
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_IS_DEV_HUB: ${{ secrets.SF_IS_DEV_HUB }}
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_INSTANCE_URL: ${{ secrets.SF_INSTANCE_URL }}
          SF_ALIAS: ${{ secrets.SF_ALIAS }}
        run: |
          ./.github/workflows/scripts/authenticate_org.sh \
            "$SF_USERNAME" "$SF_IS_DEV_HUB" "$SF_CLIENT_ID" "$SF_INSTANCE_URL" "$SF_ALIAS" \
            "$GITHUB_WORKSPACE/privatekey.key"

      - name: Deploy delta
        shell: pwsh
        env:
          SF_ALIAS: ${{ secrets.SF_ALIAS }}
        run: ./.github/workflows/scripts/deploy_delta.ps1 "$env:SF_ALIAS"
