# QA: PR validation → develop. GitHub Environment "qa".
name: SF Delta · QA · validate

on:
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: sf-qa-validate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

run-name: Validate [QA] ${{ github.head_ref }} · ${{ github.event.pull_request.updated_at || github.run_id }}

jobs:
  validating:
    name: Validating (qa)
    runs-on: ubuntu-latest
    timeout-minutes: 200
    environment: qa
    permissions:
      contents: read
    env:
      SYSTEM_PULLREQUEST_TARGETBRANCH: ${{ format('refs/heads/{0}', github.base_ref) }}
      BUILD_SOURCEBRANCH: ${{ github.ref }}
      SF_CLI_VERSION: ${{ vars.SF_CLI_VERSION != '' && vars.SF_CLI_VERSION || '2.100.0' }}
      SF_JWT_PRIVATE_KEY: ${{ secrets.SF_JWT_PRIVATE_KEY }}
      SF_USERNAME: ${{ secrets.SF_USERNAME }}
      SF_IS_DEV_HUB: ${{ secrets.SF_IS_DEV_HUB }}
      SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
      SF_INSTANCE_URL: ${{ secrets.SF_INSTANCE_URL }}
      SF_ALIAS: ${{ secrets.SF_ALIAS }}
    steps:
      # Required before any local composite action — workspace must contain action.yml
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/workflows/reusable/steps/validate_delta
        with:
          environment_name: qa
